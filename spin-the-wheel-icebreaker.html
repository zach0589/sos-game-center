<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>Spin the Wheel Ice Breaker — SOS Game Center</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1628;--surface:#0f1f38;--border:#1e3a5f;
  --sos-blue:#2a6db5;--sos-light:#5bb8f5;--sos-red:#d43a3a;
  --text:#eef;--muted:#7a9bc0;--radius:12px;
  --gold:#f5c842;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* BACKGROUND PATTERN */
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:
  radial-gradient(circle at 20% 30%, rgba(42,109,181,.12) 0%, transparent 50%),
  radial-gradient(circle at 80% 70%, rgba(212,58,58,.08) 0%, transparent 50%),
  radial-gradient(circle at 50% 50%, rgba(91,184,245,.05) 0%, transparent 60%);
  pointer-events:none;z-index:0}

/* HEADER */
.header{
  position:relative;z-index:1;
  text-align:center;padding:16px 20px 10px;
  border-bottom:2px solid var(--border);
  background:linear-gradient(180deg,rgba(15,31,56,.9),rgba(10,22,40,.95));
}
.header-inner{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
.sos-logo{height:48px}
.header h1{font-size:clamp(1.3rem,3vw,2rem);letter-spacing:2px;color:#fff;text-transform:uppercase;text-shadow:0 0 20px rgba(58,143,212,.3)}
.header h1 .hl{color:var(--sos-light)}
.header .sub{color:var(--muted);font-size:clamp(.7rem,1.2vw,.85rem);margin-top:4px;letter-spacing:3px;text-transform:uppercase}
.back-link{
  position:absolute;left:20px;top:50%;transform:translateY(-50%);
  color:var(--sos-light);text-decoration:none;font-size:.85rem;font-weight:600;
  display:flex;align-items:center;gap:6px;transition:gap .2s;
}
.back-link:hover{gap:10px;color:#fff}

/* LAYOUT */
.game-area{
  position:relative;z-index:1;
  display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-start;
  gap:28px;padding:20px 20px 10px;max-width:1500px;margin:0 auto;
}

/* STATS BAR */
.stats-bar{
  position:relative;z-index:1;
  display:flex;justify-content:center;gap:28px;padding:10px 20px;
  color:var(--muted);font-size:clamp(.7rem,1.1vw,.85rem);
  text-transform:uppercase;letter-spacing:1px;
}
.stats-bar strong{color:var(--sos-light);font-weight:700}

/* WHEEL */
.wheel-section{display:flex;flex-direction:column;align-items:center;gap:14px}
.wheel-wrapper{position:relative;width:clamp(320px,40vw,520px);height:clamp(320px,40vw,520px)}
.wheel-pointer{
  position:absolute;top:-16px;left:50%;transform:translateX(-50%);z-index:10;
  width:0;height:0;
  border-left:18px solid transparent;border-right:18px solid transparent;
  border-top:36px solid var(--sos-red);
  filter:drop-shadow(0 3px 8px rgba(212,58,58,.6));
}
canvas#wheel{width:100%;height:100%;border-radius:50%;box-shadow:0 0 40px rgba(42,109,181,.3),0 0 80px rgba(42,109,181,.1);cursor:pointer}

/* PROMPT CARD */
.prompt-section{flex:1 1 400px;max-width:580px;display:flex;flex-direction:column;gap:14px}
.prompt-card{
  background:var(--surface);border-radius:var(--radius);padding:30px 26px;
  min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;border:2px solid var(--border);transition:border-color .4s,box-shadow .4s;
  position:relative;overflow:hidden;
}
.prompt-card.active{border-color:var(--sos-light);box-shadow:0 0 30px rgba(91,184,245,.15)}
.prompt-card .category-label{
  font-size:clamp(.9rem,1.8vw,1.2rem);color:var(--sos-light);
  text-transform:uppercase;letter-spacing:3px;margin-bottom:14px;font-weight:700;
}
.prompt-card .prompt-text{font-size:clamp(1.3rem,2.6vw,2rem);font-weight:600;line-height:1.35;color:#fff}
.prompt-card .instruction{font-size:clamp(.9rem,1.4vw,1.1rem);color:var(--muted);margin-top:10px;font-style:italic}
.prompt-card .empty-state{color:var(--muted);font-size:clamp(1rem,1.8vw,1.4rem)}

/* BUTTONS */
.controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.btn{
  padding:12px 24px;border:none;border-radius:var(--radius);
  font-size:clamp(.8rem,1.2vw,1rem);font-weight:700;cursor:pointer;
  text-transform:uppercase;letter-spacing:1px;transition:transform .15s,box-shadow .25s,opacity .25s;
}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

.btn-spin{
  background:linear-gradient(135deg,var(--sos-red),#e74c4c);color:#fff;
  font-size:clamp(1rem,1.6vw,1.3rem);padding:16px 44px;
  box-shadow:0 6px 24px rgba(212,58,58,.4);
}
.btn-spin:hover:not(:disabled){box-shadow:0 8px 32px rgba(212,58,58,.55)}

.btn-secondary{background:var(--border);color:var(--text);border:1px solid rgba(91,184,245,.2)}
.btn-secondary:hover:not(:disabled){background:rgba(42,109,181,.3);box-shadow:0 4px 16px rgba(0,0,0,.3)}

.btn-reset{background:linear-gradient(135deg,var(--sos-blue),#3a8dd5);color:#fff}
.btn-reset:hover:not(:disabled){box-shadow:0 4px 16px rgba(42,109,181,.4)}

/* CONFETTI */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-20px;opacity:0;animation:confetti-fall 2.5s ease-out forwards}
@keyframes confetti-fall{
  0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}
  80%{opacity:1}
  100%{opacity:0;transform:translateY(105vh) rotate(720deg) scale(0.4)}
}

/* FOOTER */
.footer{
  position:relative;z-index:1;
  text-align:center;padding:16px;color:var(--muted);font-size:.75rem;
  border-top:1px solid var(--border);margin-top:20px;
}
.footer a{color:var(--sos-light);text-decoration:none}

/* RESPONSIVE */
@media(max-width:900px){
  .game-area{flex-direction:column;align-items:center}
  .prompt-section{max-width:90vw}
  .back-link{position:static;transform:none;margin-bottom:8px}
  .header-inner{flex-direction:column;gap:8px}
}
</style>

// ── State ──
let usedPrompts = {};
let currentCategory = null;
let spinning = false;
let spinCount = 0;
let angle = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initUsedPrompts() {
  usedPrompts = {};
  for (const cat in PROMPTS) usedPrompts[cat] = [];
  updatePromptsRemaining();
}

function getTotalRemaining() {
  let t = 0;
  for (const cat in PROMPTS) t += PROMPTS[cat].length - usedPrompts[cat].length;
  return t;
}

function updatePromptsRemaining() {
  document.getElementById("promptsRemaining").textContent = getTotalRemaining();
}

// ── Draw Wheel ──
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const cx = 400, cy = 400, radius = 380;
const segAngle = (2 * Math.PI) / CATEGORIES.length;

function drawWheel(rotationAngle) {
  ctx.clearRect(0, 0, 800, 800);

  // Outer glow
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, radius + 8, 0, 2 * Math.PI);
  ctx.strokeStyle = "rgba(42,109,181,.35)";
  ctx.lineWidth = 6;
  ctx.stroke();
  ctx.restore();

  for (let i = 0; i < CATEGORIES.length; i++) {
    const startAngle = rotationAngle + i * segAngle;
    const endAngle = startAngle + segAngle;

    // Wedge
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = COLORS[i];
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.3)";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + segAngle / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "#fff";
    ctx.font = "bold 19px 'Segoe UI', system-ui, sans-serif";
    ctx.shadowColor = "rgba(0,0,0,0.6)";
    ctx.shadowBlur = 4;

    const label = CATEGORIES[i];
    const words = label.split(" ");
    if (words.length > 1 && label.length > 10) {
      ctx.fillText(words[0], radius - 28, -8);
      ctx.fillText(words.slice(1).join(" "), radius - 28, 16);
    } else {
      ctx.fillText(label, radius - 28, 6);
    }
    ctx.restore();
  }

  // Center hub — SOS branded
  ctx.beginPath();
  ctx.arc(cx, cy, 44, 0, 2 * Math.PI);
  const hubGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 44);
  hubGrad.addColorStop(0, "#3a8dd5");
  hubGrad.addColorStop(1, "#1a5a9e");
  ctx.fillStyle = hubGrad;
  ctx.fill();
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 3;
  ctx.stroke();

  // SOS text in center
  ctx.fillStyle = "#fff";
  ctx.font = "bold 22px 'Segoe UI', system-ui, sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.shadowColor = "rgba(0,0,0,0.4)";
  ctx.shadowBlur = 3;
  ctx.fillText("SOS", cx, cy);
  ctx.shadowBlur = 0;
}

// ── Spin Logic ──
function spinWheel() {
  if (spinning) return;
  spinning = true;
  document.getElementById("btnSpin").disabled = true;
  document.getElementById("btnNext").disabled = true;
  document.getElementById("btnShowCat").disabled = true;
  hidePrompt();

  const extraSpins = 5 + Math.random() * 5;
  const targetAngle = angle + extraSpins * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const duration = 4000 + Math.random() * 1500;
  const startTime = performance.now();
  const startAngle = angle;

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    angle = startAngle + (targetAngle - startAngle) * easeOutCubic(progress);
    drawWheel(angle);
    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      document.getElementById("btnSpin").disabled = false;
      spinCount++;
      document.getElementById("spinCount").textContent = spinCount;
      resolveCategory();
    }
  }
  requestAnimationFrame(animate);
}

function resolveCategory() {
  const pointerRad = -Math.PI / 2;
  let idx = 0;
  for (let i = 0; i < CATEGORIES.length; i++) {
    let start = (angle + i * segAngle) % (2 * Math.PI);
    if (start < 0) start += 2 * Math.PI;
    let end = (angle + (i + 1) * segAngle) % (2 * Math.PI);
    if (end < 0) end += 2 * Math.PI;
    let ptr = pointerRad % (2 * Math.PI);
    if (ptr < 0) ptr += 2 * Math.PI;
    if (start < end) {
      if (ptr >= start && ptr < end) { idx = i; break; }
    } else {
      if (ptr >= start || ptr < end) { idx = i; break; }
    }
  }
  currentCategory = CATEGORIES[idx];
  showResult(currentCategory);
  launchConfetti();
}

// ── Display ──
function showResult(category) {
  const card = document.getElementById("promptCard");
  const catLabel = document.getElementById("categoryLabel");
  const promptText = document.getElementById("promptText");
  const instruction = document.getElementById("instruction");
  const emptyState = document.getElementById("emptyState");

  emptyState.style.display = "none";
  catLabel.style.display = "block";
  promptText.style.display = "block";
  instruction.style.display = "none";
  card.classList.add("active");
  catLabel.textContent = category;

  if (category === "Spin Again") {
    promptText.textContent = "Give it another spin!";
    instruction.style.display = "block";
    instruction.textContent = "Press \"Spin the Wheel\" to go again.";
    document.getElementById("btnNext").disabled = true;
    document.getElementById("btnShowCat").disabled = true;
  } else if (category === "Pass the Mic") {
    promptText.textContent = "You get to choose!";
    instruction.style.display = "block";
    instruction.textContent = "Pick someone else to answer a question — then spin for them!";
    document.getElementById("btnNext").disabled = true;
    document.getElementById("btnShowCat").disabled = true;
  } else {
    showPromptForCategory(category);
    document.getElementById("btnNext").disabled = false;
    document.getElementById("btnShowCat").disabled = false;
  }
}

function showPromptForCategory(category) {
  const all = PROMPTS[category];
  const used = usedPrompts[category];
  if (used.length >= all.length) usedPrompts[category] = [];
  const available = all.filter((_, i) => !usedPrompts[category].includes(i));
  const randIdx = Math.floor(Math.random() * available.length);
  const prompt = available[randIdx];
  const originalIdx = all.indexOf(prompt);
  usedPrompts[category].push(originalIdx);
  document.getElementById("promptText").textContent = prompt;
  updatePromptsRemaining();
}

function showNextPrompt() {
  if (!currentCategory || currentCategory === "Spin Again" || currentCategory === "Pass the Mic") return;
  showPromptForCategory(currentCategory);
}

function showCategoryAgain() {
  if (!currentCategory) return;
  const el = document.getElementById("categoryLabel");
  el.style.animation = "none";
  el.offsetHeight;
  el.style.animation = "pulseGlow 0.6s ease";
}

function hidePrompt() {
  document.getElementById("promptCard").classList.remove("active");
  document.getElementById("categoryLabel").style.display = "none";
  document.getElementById("promptText").style.display = "none";
  document.getElementById("instruction").style.display = "none";
  document.getElementById("emptyState").style.display = "block";
}

function resetPrompts() {
  initUsedPrompts();
  hidePrompt();
  currentCategory = null;
  document.getElementById("btnNext").disabled = true;
  document.getElementById("btnShowCat").disabled = true;
}

function newGame() {
  resetPrompts();
  spinCount = 0;
  document.getElementById("spinCount").textContent = "0";
  angle = 0;
  drawWheel(0);
}

// ── Confetti ──
function launchConfetti() {
  const container = document.getElementById("confettiContainer");
  container.innerHTML = "";
  const colors = ["#2a6db5","#d43a3a","#5bb8f5","#1abc9c","#9b59b6","#e67e22","#27ae60","#3498db","#00b894","#e74c3c"];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement("div");
    piece.className = "confetti-piece";
    piece.style.left = Math.random() * 100 + "%";
    piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (6 + Math.random() * 10) + "px";
    piece.style.height = (6 + Math.random() * 10) + "px";
    piece.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
    piece.style.animationDelay = (Math.random() * 0.6) + "s";
    piece.style.animationDuration = (2 + Math.random() * 1.5) + "s";
    container.appendChild(piece);
  }
  setTimeout(() => { container.innerHTML = ""; }, 4500);
}

// ── Pulse keyframes ──
const s = document.createElement("style");
s.textContent = "@keyframes pulseGlow{0%{transform:scale(1);text-shadow:0 0 0 transparent}50%{transform:scale(1.1);text-shadow:0 0 20px rgba(91,184,245,.5)}100%{transform:scale(1);text-shadow:0 0 0 transparent}}";
document.head.appendChild(s);

// ── Event Listeners (no inline handlers) ──
document.getElementById("btnSpin").addEventListener("click", function() { spinWheel(); });
document.getElementById("wheel").addEventListener("click", function() { spinWheel(); });
document.getElementById("btnNext").addEventListener("click", function() { showNextPrompt(); });
document.getElementById("btnShowCat").addEventListener("click", function() { showCategoryAgain(); });
document.getElementById("btnReset").addEventListener("click", function() { resetPrompts(); });
document.getElementById("btnNewGame").addEventListener("click", function() { newGame(); });

// ── Init ──
initUsedPrompts();
drawWheel(0);
</script>
